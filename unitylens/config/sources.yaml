# UnityLens source configuration
#
# Environment variable interpolation is supported via ${VAR_NAME} syntax.
# Each source must have a unique "name" and a "type" matching a registered
# source class (databricks, snowflake, oracle, etc.).

sources:
  - name: prod_databricks
    type: databricks
    host: ${DATABRICKS_HOST}
    token: ${DATABRICKS_TOKEN}
    warehouse_id: ${DATABRICKS_WAREHOUSE_ID}
    catalog_filter: [bg]  # Only crawl catalogs owned by brice.giesbrecht@databricks.com
    deny_tags: {}
    allow_tags: {}

  # Example Snowflake source (uncomment when ready):
  # - name: prod_snowflake
  #   type: snowflake
  #   account: ${SNOWFLAKE_ACCOUNT}
  #   user: ${SNOWFLAKE_USER}
  #   password: ${SNOWFLAKE_PASSWORD}
  #   warehouse: ${SNOWFLAKE_WAREHOUSE}
  #   role: ${SNOWFLAKE_ROLE}

  # Oracle sources.
  #
  # Each Oracle database is its own entry. Namespace env vars by source
  # name so multiple Oracle databases can coexist:
  #   ORACLE_<SOURCE>_DSN / _USER / _PASSWORD
  #
  # The ${VAR:-default} syntax provides a fallback for local dev only —
  # production credentials should always come from real env vars.

  - name: local_oracle
    type: oracle
    dsn: ${ORACLE_LOCAL_DSN:-localhost:1521/FREEPDB1}
    user: ${ORACLE_LOCAL_USER:-system}
    password: ${ORACLE_LOCAL_PASSWORD:-password123}
    include_views: true
    schema_filter: [GEO, SOLAR]

  # Example additional Oracle source (uncomment and set env vars):
  # - name: prod_oracle
  #   type: oracle
  #   dsn: ${ORACLE_PROD_DSN}
  #   user: ${ORACLE_PROD_USER}
  #   password: ${ORACLE_PROD_PASSWORD}
  #   schema_filter: []        # e.g. [HR, SALES] to restrict
  #   include_views: true
